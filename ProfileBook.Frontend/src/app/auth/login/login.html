<div class="login-page-wrapper">
  <div class="split-container">
    <!-- Left Side: Simple Branding -->
    <div class="brand-side">
      <div class="brand-content">
        <div class="logo-circle">
          <i class="fa-solid fa-user-group"></i>
        </div>
        <h1>ProfileBook</h1>
        <p class="tagline">The modern way to connect and share.</p>
      </div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="form-side">
      <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your details to sign in</p>
        
        <div *ngIf="errorMessage" class="error-alert">
          <i class="fa-solid fa-triangle-exclamation" style="margin-right: 8px;"></i>
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" [(ngModel)]="loginData.username"
              placeholder="Enter your username" required
              [class.input-error]="formSubmitted && !loginData.username.trim()">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" [(ngModel)]="loginData.password"
              placeholder="••••••••" required
              [class.input-error]="formSubmitted && !loginData.password.trim()">
          </div>
          
          <button type="submit" class="btn-primary" [disabled]="isLoading">
            <span *ngIf="!isLoading">Sign In</span>
            <span *ngIf="isLoading"><i class="fa-solid fa-spinner fa-spin"></i> Processing...</span>
          </button>
        </form>
        
        <div class="auth-footer">
          <p>New here? <a routerLink="/register">Create an account</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Exclusive Footer -->
  <footer class="login-footer">
    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
    <p class="copyright">&copy; 2024 ProfileBook. All rights reserved.</p>
  </footer>
</div>
