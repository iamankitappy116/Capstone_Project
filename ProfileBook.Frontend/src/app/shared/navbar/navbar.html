<nav class="navbar">
  <div class="navbar-brand">
    <div class="logo-icon">
      <i class="fa-solid fa-user-group"></i>
    </div>
    <h1>ProfileBook</h1>
  </div>

  <div class="search-bar">
    <i class="fa-solid fa-magnifying-glass" style="color: #9ca3af; font-size: 14px;"></i>
    <input type="text" [(ngModel)]="searchQuery" (input)="onSearchChange()" placeholder="Search users...">

    <!-- Search Results Dropdown -->
    <div class="search-results" *ngIf="filteredUsers.length > 0">
      <div class="search-item" *ngFor="let user of filteredUsers">
        <div class="user-info">
          <img [src]="user.profileImage ? 'http://localhost:5134' + user.profileImage : 'https://ui-avatars.com/api/?name=' + user.username + '&background=random'" alt="User">
          <span>{{user.username}}</span>
        </div>
        <button class="msg-btn" (click)="startChat(user)">
          <i class="fa-solid fa-paper-plane" style="font-size: 12px;"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="nav-actions">
  <div class="notification-icon">
    <i class="fa-solid fa-bell"></i>
    <span class="badge">3</span>
  </div>

  <div class="profile-container" (click)="$event.stopPropagation()">
    <div class="profile-pic">
      <img [src]="getProfileImage()" alt="Profile" (click)="toggleDropdown()">
    </div>
    <div class="profile-dropdown" *ngIf="showDropdown">
      <div class="dropdown-item" (click)="viewProfile()">
        <i class="fa-solid fa-user"></i>
        <span>View Profile</span>
      </div>
      <div class="dropdown-item" (click)="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Logout</span>
      </div>
    </div>
  </div>
  <div class="dropdown-header">
    <strong>{{userProfile?.username}}</strong>
    <small>{{userProfile?.email}}</small>
  </div>
</div>
</nav>
