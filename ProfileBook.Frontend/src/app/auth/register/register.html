<div class="login-page-wrapper">
  <div class="split-container">

    <!-- Left Side -->
    <div class="brand-side">
      <div class="brand-content">
        <div class="logo-circle">
          <i class="fa-solid fa-user-group"></i>
        </div>
        <h1>ProfileBook</h1>
        <p class="tagline">The modern way to connect and share.</p>
      </div>
    </div>

    <!-- Right Side -->
    <div class="form-side">
      <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join ProfileBook today and start sharing</p>

        <!-- Global Messages -->
        <div *ngIf="errorMessage" class="error-alert">
          <i class="fa-solid fa-triangle-exclamation" style="margin-right: 8px;"></i>
          {{ errorMessage }}
        </div>
        <div *ngIf="successMessage" class="success-alert">
          <i class="fa-solid fa-circle-check" style="margin-right: 8px;"></i>
          {{ successMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
          
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" [(ngModel)]="registerData.username" 
                   placeholder="Enter your username" required #usernameInput autofocus
                   (keydown.enter)="goToNextField($event, emailInput)">
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" [(ngModel)]="registerData.email" 
                   placeholder="yourname@example.com" required #emailInput
                   (keydown.enter)="goToNextField($event, passwordInput)">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" [(ngModel)]="registerData.password" 
                   placeholder="••••••••" required #passwordInput
                   (keydown.enter)="goToNextField($event, confirmPasswordInput)">
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="registerData.confirmPassword" 
                   placeholder="••••••••" required #confirmPasswordInput>
          </div>
          
          <button type="submit" class="btn-primary" [disabled]="!registerForm.valid">
            <span>Register</span>
          </button>

        </form>
        
        <div class="auth-footer">
          <p>Already have an account? <a routerLink="/login">Sign In</a></p>
        </div>

      </div>
    </div>
  </div>

  <!-- Footer (Same as Login) -->
  <footer class="login-footer">
    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
    <p class="copyright">&copy; 2024 ProfileBook. All rights reserved.</p>
  </footer>
</div>
