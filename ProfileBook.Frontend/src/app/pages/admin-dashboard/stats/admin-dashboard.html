<header class="header">
  <h1>Dashboard</h1>
  <p>Overview of ProfileBook platform</p>
</header>

<!-- Stats Grid -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-info">
      <span class="stat-label">Total Users</span>
      <h2 class="stat-value">{{stats.totalUsers}}</h2>
    </div>
    <div class="stat-icon users">
      <i class="fa-solid fa-users"></i>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-info">
      <span class="stat-label">Pending Posts</span>
      <h2 class="stat-value">{{stats.pendingPosts}}</h2>
    </div>
    <div class="stat-icon posts">
      <i class="fa-solid fa-file-pen"></i>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-info">
      <span class="stat-label">Reports</span>
      <h2 class="stat-value">{{stats.totalReports}}</h2>
    </div>
    <div class="stat-icon reports">
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-info">
      <span class="stat-label">Active Groups</span>
      <h2 class="stat-value">{{stats.activeGroups}}</h2>
    </div>
    <div class="stat-icon groups">
      <i class="fa-solid fa-layer-group"></i>
    </div>
  </div>
</div>

<!-- Recent Activity Section -->
<div class="activity-section">
  <div class="section-header">
    <h3>Recent Activity</h3>
  </div>
  <div class="activity-list">
    <div class="activity-item" *ngFor="let activity of stats.recentActivities">
      <div class="activity-details">
        <span class="user-name">{{activity.userName}}</span>
        <span class="action-text">{{activity.action}}</span>
      </div>
      <div class="activity-time">
        {{activity.timeAgo}}
      </div>
    </div>

    <div class="no-activity" *ngIf="stats.recentActivities.length === 0">
      No recent activity to show.
    </div>
  </div>
</div>
