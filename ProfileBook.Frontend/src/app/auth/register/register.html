<div class="auth-container">
  <div class="auth-card">
    
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
        <path d="M1 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H1Zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
        <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5Z"/>
      </svg>
    </div>

    <h2>Create Account</h2>
    <p class="subtitle">Join ProfileBook today</p>
    
    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="successMessage" class="success-alert" style="background-color: #d1fae5; color: #059669; padding: 10px; border-radius: 6px; font-size: 14px; margin-bottom: 20px;">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" [(ngModel)]="registerData.username" placeholder="johndoe" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="registerData.email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="registerData.password" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="registerData.confirmPassword" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn-primary" [disabled]="!registerForm.valid">
        Register
      </button>

    </form>
    
    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Login</a></p>
    </div>

  </div>
</div>
